# https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml
# Cache results to avoid re-hitting external sites on every run.
cache = true
max_cache_age = "1d"

# Check external links only; internal links/anchors/images are validated at build
# time by Docusaurus (onBrokenLinks/onBrokenAnchors/onBrokenMarkdownLinks: throw).
# root_dir lets lychee parse root-relative links (/web/...) without erroring;
# scheme then limits checking to external URLs, so those internal links aren't fetched.
root_dir = "docs"
scheme = ["https", "http"]
exclude = [
    'https://app.datadoghq.com',
    'https://cocoapods.org',
    'https://community.embrace.io',
    'https://discussions.unity.com',
    'https://github.com/embrace-io/embrace-unity-sdk/releases/download',
    'https://help.splunk.com',
    'https://one.eu.newrelic.com',
    'https://one.newrelic.com',
    'https://opentelemetry.io',
    'https://reactnative.dev',
    'https://support.speedcurve.com',
    'https://us5.datadoghq.com',
    'https://www.npmjs.com',
    'https://webhook.site'
]
accept = ["200", "429", "503"]
